{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    {{- include "mlflow.labels" . | nindent 4 }}
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
        {{- include "mlflow.labels" . | nindent 8 }}
    spec:
      containers:
        - name: mlflow
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["mlflow", "server"]
          args:
            - "--backend-store-uri"
            - {{ .Values.backendStoreUri | quote }}
            - "--default-artifact-root"
            - {{ .Values.artifactRoot | quote }}
            - "--host"
            - "0.0.0.0"
            - "--port"
            - {{ .Values.port | quote }}
            - "--cors-allowed-origins"
            - "*"
            - "--allowed-hosts"
            - "*"
          env:
            - name: MLFLOW_S3_ENDPOINT_URL
              value: {{ .Values.s3Endpoint | quote }}
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.aws.accessKeyId | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.aws.secretAccessKey | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          # livenessProbe:
          #   httpGet:
          #     path: /health
          #     port: http
          #   initialDelaySeconds: 30
          #   periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
