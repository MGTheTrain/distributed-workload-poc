{{- if .Values.prefect.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-server
  labels:
    {{- include "distributed-workload-poc.labels" . | nindent 4 }}
    app: prefect-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-server
  template:
    metadata:
      labels:
        app: prefect-server
        {{- include "distributed-workload-poc.labels" . | nindent 8 }}
    spec:
      containers:
        - name: prefect-server
          image: "{{ .Values.prefect.image.repository }}:{{ .Values.prefect.image.tag }}"
          imagePullPolicy: {{ .Values.prefect.image.pullPolicy }}
          command: ["prefect", "server", "start"]
          args:
            - "--host"
            - "0.0.0.0"
            - "--port"
            - {{ .Values.prefect.port | quote }}
          env:
            - name: RAY_ADDRESS
              value: {{ .Values.prefect.rayAddress | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.prefect.port }}
          volumeMounts:
            - name: workloads-orchestration
              mountPath: /workspace/workloads/orchestration
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.prefect.resources | nindent 12 }}
      volumes:
        - name: workloads-orchestration
          configMap:
            name: workloads-orchestration
{{- end }}
