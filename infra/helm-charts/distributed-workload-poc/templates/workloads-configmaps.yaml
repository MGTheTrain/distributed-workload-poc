{{- /*
  Workload ConfigMaps. These MUST stay in the parent: both the ray-cluster
  subchart (etl/training/tuning/inference) and the prefect subchart
  (orchestration) mount them, so they live at the common ancestor.
*/}}
{{- range $dir := list "etl" "training" "tuning" "inference" "orchestration" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: workloads-{{ $dir }}
  labels:
    {{- include "distributed-workload-poc.labels" $ | nindent 4 }}
data:
  {{- $glob := printf "files/workloads/%s/*" $dir }}
  {{- range $path, $_ := $.Files.Glob $glob }}
  {{ base $path }}: |-
{{ $.Files.Get $path | indent 4 }}
  {{- end }}
{{- end }}
