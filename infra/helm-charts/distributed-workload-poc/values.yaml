# ===========================================================================
# distributed-workload-poc — umbrella values
# ===========================================================================
# mlflow and prefect are now local subcharts (siblings: ../mlflow, ../prefect).
# Their blocks are passed straight through; keys are the subchart's own keys.
#
# The workloads-* ConfigMaps and the Ray PV/PVC are rendered by THIS chart's
# templates/ (shared by ray-cluster and prefect), so they stay here.
# ===========================================================================

# --- PostgreSQL (community subchart) ---------------------------------------
postgres:
  enabled: true
  fullnameOverride: postgres   # Service becomes "postgres", matching MLflow's connection string
  auth:
    username: mlflow
    password: mlflow
    database: mlflow
  primary:
    persistence:
      enabled: false
    initdb:
      scripts:
        00-init.sql: |
          CREATE DATABASE prefect;
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  readReplicas:
    replicaCount: 0
  metrics:
    enabled: false

# --- MLflow (local subchart ../mlflow) -------------------------------------
mlflow:
  enabled: true
  image:
    repository: mgthetrain987/distributed-workload-poc-mlflow
    tag: latest
    pullPolicy: IfNotPresent
  port: 5000
  backendStoreUri: "postgresql://mlflow:mlflow@postgres:5432/mlflow"
  artifactRoot: "s3://mlflow-artifacts/"
  s3Endpoint: "http://localstack:4566"
  aws:
    accessKeyId: test
    secretAccessKey: test
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# --- Prefect (local subchart ../prefect) -----------------------------------
prefect:
  enabled: true
  image:
    repository: mgthetrain987/distributed-workload-poc-prefect
    tag: latest
    pullPolicy: IfNotPresent
  port: 4200
  rayAddress: "ray://ray-cluster-head-svc:10001"
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # workloads-orchestration ConfigMap is owned by the parent (rendered in
  # templates/workloads-configmaps.yaml). Injected into the subchart here.
  # NOTE: Helm REPLACES list values on override — restate this whole block
  # if you override volumes/volumeMounts downstream.
  volumes:
    - name: workloads-orchestration
      configMap:
        name: workloads-orchestration
  volumeMounts:
    - name: workloads-orchestration
      mountPath: /workspace/workloads/orchestration

# --- Shared Ray data PV/PVC (rendered by this chart's templates/) ----------
rayData:
  enabled: true
  storage: 10Gi
  hostPath: /tmp/ray-data
  accessModes:
    - ReadWriteMany

# --- LocalStack (community subchart) ---------------------------------------
localstack:
  enabled: true
  fullnameOverride: localstack
  image:
    repository: localstack/localstack
    tag: "4.9.0"
  service:
    type: ClusterIP
  startServices: s3
  extraEnvVars:
    - name: AWS_ACCESS_KEY_ID
      value: test
    - name: AWS_SECRET_ACCESS_KEY
      value: test
  persistence:
    enabled: false

# --- KubeRay operator (community subchart) ---------------------------------
kuberay-operator:
  enabled: true
  fullnameOverride: kuberay-operator

# --- Ray cluster (community subchart) --------------------------------------
ray-cluster:
  enabled: true
  fullnameOverride: ray-cluster
  image:
    repository: mgthetrain987/distributed-workload-poc-ray
    tag: latest
    pullPolicy: IfNotPresent
  head:
    readinessProbe:
      initialDelaySeconds: 60
      periodSeconds: 10
      failureThreshold: 5
    initContainers:
      - name: fix-permissions
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 1000:100 /workspace/data && chmod -R 775 /workspace/data"]
        volumeMounts:
          - name: ray-data
            mountPath: /workspace/data
        securityContext:
          runAsUser: 0
    rayStartParams:
      dashboard-host: "0.0.0.0"
      num-cpus: "10"
    resources:
      requests:
        cpu: 2
        memory: 4Gi
      limits:
        cpu: 4
        memory: 8Gi
    volumes:
      - name: ray-data
        persistentVolumeClaim: { claimName: ray-shared-data }
      - name: workloads-etl
        configMap: { name: workloads-etl }
      - name: workloads-training
        configMap: { name: workloads-training }
      - name: workloads-tuning
        configMap: { name: workloads-tuning }
      - name: workloads-inference
        configMap: { name: workloads-inference }
    volumeMounts:
      - { name: ray-data,            mountPath: /workspace/data }
      - { name: workloads-etl,       mountPath: /workspace/workloads/etl }
      - { name: workloads-training,  mountPath: /workspace/workloads/training }
      - { name: workloads-tuning,    mountPath: /workspace/workloads/tuning }
      - { name: workloads-inference, mountPath: /workspace/workloads/inference }
    containerEnv:
      - { name: RAY_ADDRESS,            value: "ray://ray-cluster-head-svc:10001" }
      - { name: MLFLOW_TRACKING_URI,    value: "http://mlflow:5000" }
      - { name: AWS_ACCESS_KEY_ID,      value: "test" }
      - { name: AWS_SECRET_ACCESS_KEY,  value: "test" }
      - { name: AWS_DEFAULT_REGION,     value: "us-east-1" }
      - { name: AWS_S3_ENDPOINT_URL,    value: "http://localstack:4566" }
      - { name: MLFLOW_S3_ENDPOINT_URL, value: "http://localstack:4566" }
      - { name: DATA_DIR,               value: "/workspace/data" }
  worker:
    initContainers:
      - name: fix-permissions
        image: busybox:1.36
        command: ["sh", "-c", "chown -R 1000:100 /workspace/data && chmod -R 775 /workspace/data"]
        volumeMounts:
          - name: ray-data
            mountPath: /workspace/data
        securityContext:
          runAsUser: 0
    replicas: 2
    rayStartParams:
      num-cpus: "1"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1
        memory: 2Gi
    volumes:
      - name: ray-data
        persistentVolumeClaim:
          claimName: ray-shared-data
    volumeMounts:
      - name: ray-data
        mountPath: /workspace/data
    containerEnv:
      - { name: RAY_ADDRESS,            value: "ray://ray-cluster-head-svc:10001" }
      - { name: MLFLOW_TRACKING_URI,    value: "http://mlflow:5000" }
      - { name: AWS_ACCESS_KEY_ID,      value: "test" }
      - { name: AWS_SECRET_ACCESS_KEY,  value: "test" }
      - { name: AWS_DEFAULT_REGION,     value: "us-east-1" }
      - { name: AWS_S3_ENDPOINT_URL,    value: "http://localstack:4566" }
      - { name: MLFLOW_S3_ENDPOINT_URL, value: "http://localstack:4566" }
      - { name: DATA_DIR,               value: "/workspace/data" }
