{{- if .Values.mlflow.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    {{- include "distributed-workload-platform.labels" . | nindent 4 }}
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
        {{- include "distributed-workload-platform.labels" . | nindent 8 }}
    spec:
      containers:
        - name: mlflow
          image: "{{ .Values.mlflow.image.repository }}:{{ .Values.mlflow.image.tag }}"
          imagePullPolicy: {{ .Values.mlflow.image.pullPolicy }}
          command: ["mlflow", "server"]
          args:
            - "--backend-store-uri"
            - {{ .Values.mlflow.backendStoreUri | quote }}
            - "--default-artifact-root"
            - {{ .Values.mlflow.artifactRoot | quote }}
            - "--host"
            - "0.0.0.0"
            - "--port"
            - {{ .Values.mlflow.port | quote }}
            - "--cors-allowed-origins"
            - "*"
            - "--allowed-hosts"
            - "*"
          env:
            - name: MLFLOW_S3_ENDPOINT_URL
              value: {{ .Values.mlflow.s3Endpoint | quote }}
            - name: AWS_ACCESS_KEY_ID
              value: {{ .Values.mlflow.aws.accessKeyId | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              value: {{ .Values.mlflow.aws.secretAccessKey | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.mlflow.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.mlflow.resources | nindent 12 }}
{{- end }}
