name: Build multi-arch images
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: distributed-workload-poc-mlflow
            context: ./infra/compose/mlflow
            file:    ./infra/compose/mlflow/Dockerfile
            image:   distributed-workload-poc-mlflow
          - name: distributed-workload-poc-prefect
            context: ./infra/compose/prefect
            file:    ./infra/compose/prefect/Dockerfile
            image:   distributed-workload-poc-prefect
          - name: distributed-workload-poc-ray
            context: ./infra/compose/ray
            file:    ./infra/compose/ray/Dockerfile
            image:   distributed-workload-poc-ray
    env:
      PROJECT_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
        with: { platforms: amd64,arm64 }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
